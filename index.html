<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PhiloFlash — Citations du Bac</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --text: #e8e8f0;
    --text-muted: #7070a0;
    --gold: #f0c040;
    --gold-dim: #a08020;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4;
  }

  /* ──── APP SHELL ──── */
  #app { max-width: 480px; margin: 0 auto; padding: 0 0 80px; min-height: 100vh; position: relative; }

  /* ──── HEADER ──── */
  header {
    padding: 24px 20px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(to bottom, var(--bg) 80%, transparent);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
    color: var(--gold);
  }
  .logo span { color: var(--text-muted); font-weight: 400; font-style: italic; font-size: 14px; display: block; margin-top: -2px; }
  .score-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 13px; color: var(--gold);
  }

  /* ──── SCREENS ──── */
  .screen { padding: 20px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

  /* ──── HOME ──── */
  .hero {
    text-align: center; padding: 28px 0 20px;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px; font-weight: 900; line-height: 1.1;
    color: var(--text);
  }
  .hero-title em { color: var(--gold); font-style: italic; }
  .hero-sub { color: var(--text-muted); font-size: 14px; margin-top: 8px; line-height: 1.5; }

  .modes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
  .mode-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 14px;
    cursor: pointer; transition: all 0.2s;
    text-align: center;
  }
  .mode-card:hover, .mode-card:active { border-color: var(--gold); background: var(--surface2); transform: scale(0.98); }
  .mode-card .icon { font-size: 28px; margin-bottom: 8px; }
  .mode-card h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .mode-card p { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  .mode-card.featured {
    grid-column: span 2;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-color: var(--gold-dim);
  }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-muted); margin-bottom: 12px; margin-top: 28px;
  }
  .themes-list { display: flex; flex-direction: column; gap: 8px; }
  .theme-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .theme-row:hover, .theme-row:active { background: var(--surface2); transform: translateX(4px); }
  .theme-row .emoji { font-size: 22px; width: 36px; text-align: center; }
  .theme-row .info { flex: 1; }
  .theme-row .info h4 { font-size: 14px; font-weight: 500; color: var(--text); }
  .theme-row .info small { font-size: 11px; color: var(--text-muted); }
  .theme-row .arrow { color: var(--text-muted); font-size: 16px; }
  .progress-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

  /* ──── THEME SCREEN ──── */
  .theme-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 0 20px;
  }
  .back-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 12px; cursor: pointer;
    font-size: 16px; color: var(--text); transition: all 0.2s;
  }
  .back-btn:hover { background: var(--surface2); }
  .theme-header h2 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }

  .mode-tabs {
    display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px;
  }
  .mode-tab {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px; cursor: pointer;
    font-size: 12px; font-weight: 500; white-space: nowrap;
    transition: all 0.2s; color: var(--text-muted);
  }
  .mode-tab.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 600; }

  /* ──── FLASHCARD ──── */
  .flashcard-area { perspective: 1000px; }
  .flashcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 32px 28px;
    min-height: 260px;
    display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    position: relative; overflow: hidden;
  }
  .flashcard:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .flashcard::before {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle, var(--theme-color, #7c3aed22) 0%, transparent 70%);
    pointer-events: none;
  }

  .card-face { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-muted); margin-bottom: 16px;
  }
  .card-citation {
    font-family: 'Playfair Display', serif;
    font-size: 17px; line-height: 1.6; font-style: italic;
    color: var(--text); flex: 1;
  }
  .card-citation .blank {
    display: inline-block;
    border-bottom: 2px solid var(--gold);
    min-width: 80px; color: transparent;
    background: var(--gold-dim); border-radius: 3px;
    vertical-align: middle; height: 20px;
  }
  .card-hint {
    text-align: center; margin-top: 20px;
    font-size: 12px; color: var(--text-muted);
  }
  .card-hint span { background: var(--surface2); padding: 4px 10px; border-radius: 20px; }

  .card-back-author {
    font-family: 'Space Mono', monospace;
    font-size: 16px; font-weight: 700; color: var(--gold);
    margin-bottom: 4px;
  }
  .card-back-oeuvre { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; font-style: italic; }
  .card-back-expl { font-size: 14px; line-height: 1.6; color: var(--text); border-top: 1px solid var(--border); padding-top: 16px; }

  .card-actions { display: flex; gap: 10px; margin-top: 16px; }
  .card-btn {
    flex: 1; padding: 14px; border-radius: 12px;
    border: none; cursor: pointer; font-size: 15px;
    font-weight: 600; transition: all 0.15s; font-family: 'Inter', sans-serif;
  }
  .card-btn.fail { background: #2d1515; color: #ff6b6b; border: 1px solid #5a2020; }
  .card-btn.pass { background: #152d15; color: #6bff6b; border: 1px solid #205a20; }
  .card-btn.fail:hover { background: #3d2020; }
  .card-btn.pass:hover { background: #203d20; }

  .card-counter {
    text-align: center; font-family: 'Space Mono', monospace;
    font-size: 12px; color: var(--text-muted); margin-bottom: 12px;
  }

  /* ──── QUIZ ──── */
  .quiz-question {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px 20px;
    margin-bottom: 16px;
  }
  .quiz-q-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .quiz-q-text {
    font-family: 'Playfair Display', serif;
    font-size: 16px; line-height: 1.65; font-style: italic; color: var(--text);
  }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .quiz-option {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    cursor: pointer; transition: all 0.15s;
    font-size: 14px; font-weight: 500; color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }
  .quiz-option:hover:not(.disabled) { border-color: var(--gold); background: var(--surface2); }
  .quiz-option.correct { background: #152d15; border-color: #4ade80; color: #4ade80; }
  .quiz-option.wrong { background: #2d1515; border-color: #f87171; color: #f87171; }
  .quiz-option.disabled { pointer-events: none; opacity: 0.5; }
  .quiz-option .opt-letter {
    width: 26px; height: 26px; border-radius: 8px;
    background: var(--surface2); display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .quiz-feedback {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-top: 12px;
    font-size: 13px; line-height: 1.6; color: var(--text);
    animation: fadeIn 0.3s ease;
  }
  .quiz-feedback strong { color: var(--gold); font-family: 'Space Mono', monospace; display: block; margin-bottom: 4px; }
  .next-btn {
    width: 100%; padding: 16px; border-radius: 12px; border: none;
    background: var(--gold); color: var(--bg); font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 12px; font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .next-btn:hover { background: #e0b030; transform: scale(0.99); }

  /* ──── TROUS ──── */
  .trous-input {
    display: block; width: 100%; margin: 16px 0;
    background: var(--surface2); border: 2px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    font-size: 16px; color: var(--text); font-family: 'Inter', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .trous-input:focus { border-color: var(--gold); }
  .trous-input.correct-input { border-color: #4ade80; background: #152d15; }
  .trous-input.wrong-input { border-color: #f87171; background: #2d1515; }

  /* ──── RESULTS ──── */
  .results-screen { text-align: center; padding: 40px 20px; }
  .results-score {
    font-family: 'Playfair Display', serif;
    font-size: 72px; font-weight: 900; color: var(--gold);
    line-height: 1;
  }
  .results-score small { font-size: 28px; color: var(--text-muted); }
  .results-msg { font-size: 18px; margin: 12px 0 8px; font-weight: 600; }
  .results-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
  .results-btn {
    display: inline-block; padding: 14px 28px; border-radius: 12px;
    background: var(--gold); color: var(--bg); font-size: 15px;
    font-weight: 700; cursor: pointer; border: none; font-family: 'Inter', sans-serif;
    margin: 6px; transition: all 0.2s;
  }
  .results-btn.outline {
    background: transparent; border: 1px solid var(--border); color: var(--text);
  }
  .results-btn:hover { opacity: 0.9; transform: scale(0.98); }

  /* ──── BADGE ──── */
  .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; justify-content: center; }
  .badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px; font-size: 12px;
    display: flex; align-items: center; gap: 6px;
  }

  /* ──── NAV ──── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; z-index: 200;
  }
  .nav-item {
    flex: 1; padding: 12px 0; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    transition: all 0.2s; font-size: 11px; color: var(--text-muted);
  }
  .nav-item span:first-child { font-size: 20px; }
  .nav-item.active { color: var(--gold); }

  /* ──── STREAK ──── */
  .streak-banner {
    background: linear-gradient(135deg, #2d1a00, #3d2800);
    border: 1px solid #6b4000; border-radius: 12px;
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .streak-banner .flame { font-size: 28px; }
  .streak-banner h4 { font-size: 14px; font-weight: 600; color: var(--gold); }
  .streak-banner p { font-size: 12px; color: #a06020; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ───────────────────────────────────────────────────────────────
// DATA
// ───────────────────────────────────────────────────────────────
const themes = [
  { id:1, slug:"philosophie", title:"Qu'est-ce que la philosophie ?", emoji:"🦉", color:"#7C3AED",
    citations:[
      { id:"p1", auteur:"Aristote", oeuvre:"Métaphysique", citation:"C'est l'étonnement qui poussa comme aujourd'hui les premiers penseurs aux spéculations philosophiques.", explication:"La philosophie naît de l'émerveillement, de l'écart entre ce qui est et ce qui devrait être." },
      { id:"p2", auteur:"Aristote", oeuvre:"Métaphysique", citation:"Le commencement de toutes les sciences, c'est l'étonnement de ce que les choses sont ce qu'elles sont.", explication:"En philosophie, rien ne va de soi. Le philosophe s'étonne et s'interroge sur tout." },
      { id:"p3", auteur:"Aristote", oeuvre:"Métaphysique", citation:"Vous dites qu'il faut philosopher ? Alors il faut en effet philosopher. Vous dites qu'il ne faut pas philosopher ? Alors il faut encore philosopher pour le démontrer. De toute manière, il est nécessaire de philosopher.", explication:"La philosophie est incontournable. On ne saurait se passer d'elle." },
      { id:"p4", auteur:"Albert Thibaudet", oeuvre:"", citation:"La philosophie peut se définir non comme la science de tout mais comme la science du tout.", explication:"La philosophie s'intéresse à l'homme et aux rapports généraux qu'il entretient avec ses semblables, la nature et l'Absolu." },
      { id:"p5", auteur:"Bertrand Russell", oeuvre:"", citation:"La valeur de la philosophie doit en réalité surtout résider dans son incertitude même.", explication:"La philosophie invite à réfléchir constamment sur les réponses qu'on croit avoir trouvées." },
      { id:"p6", auteur:"Karl Jaspers", oeuvre:"Introduction à la philosophie", citation:"L'essence de la philosophie, c'est la recherche de la vérité, non sa possession.", explication:"Ce qui fait la philosophie, c'est l'insatiable désir de connaître davantage." },
      { id:"p7", auteur:"Karl Jaspers", oeuvre:"Introduction à la philosophie", citation:"Faire de la philosophie, c'est être en route ; les questions en philosophie sont plus essentielles que les réponses et chaque réponse devient une nouvelle question.", explication:"La philosophie est une quête perpétuelle de la vérité, antidogmatique par essence." },
      { id:"p8", auteur:"Karl Marx", oeuvre:"XIe thèse sur Feuerbach", citation:"Jusqu'ici les philosophes n'ont fait qu'interpréter le monde de différentes manières. Il s'agit maintenant de le transformer.", explication:"La philosophie doit nous donner des règles d'action ; la théorie et la pratique ne se dissocient pas." },
      { id:"p9", auteur:"Emmanuel Kant", oeuvre:"Critique de la raison pure", citation:"Jusqu'ici, on ne peut apprendre aucune philosophie : car où est-elle, qui la possède et à quoi peut-on la connaître ? On ne peut qu'apprendre à philosopher.", explication:"Philosopher, c'est réfléchir par soi-même, exercer sa propre raison — pas appliquer des formules." },
      { id:"p10", auteur:"René Descartes", oeuvre:"Préface aux principes de la philosophie", citation:"C'est proprement avoir les yeux fermés sans tâcher jamais de les ouvrir que de vivre sans philosopher.", explication:"La philosophie permet à l'homme de vivre avec sagesse et prudence. Elle est indispensable au bonheur." },
      { id:"p11", auteur:"René Descartes", oeuvre:"Préface aux principes de la philosophie", citation:"C'est la philosophie seule qui nous distingue des sauvages et barbares.", explication:"La philosophie fait l'essence même de l'homme." },
      { id:"p12", auteur:"Socrate", oeuvre:"", citation:"Je ne sais qu'une chose c'est que je ne sais rien.", explication:"Le philosophe est un homme humble, conscient de son ignorance et de la limite de ses connaissances." },
      { id:"p13", auteur:"Platon", oeuvre:"Phédon", citation:"Philosopher c'est apprendre à mourir.", explication:"La philosophie est accès à l'intelligible et refus du sensible. Le philosophe méprise les richesses matérielles." },
      { id:"p14", auteur:"Épicure", oeuvre:"", citation:"Quand on est jeune, il faut se mettre à philosopher et quand on est vieux, il ne faut pas se lasser de philosopher.", explication:"La philosophie mérite qu'on lui consacre toute notre existence." },
      { id:"p15", auteur:"Pascal", oeuvre:"Pensées", citation:"Se moquer de la philosophie c'est vraiment philosopher.", explication:"La philosophie est l'unique discipline qui se prend elle-même pour objet." },
      { id:"p16", auteur:"Marcien Towa", oeuvre:"Essai", citation:"La philosophie est essentiellement sacrilège.", explication:"Il n'y a pas en philosophie de sacré ou de tabou. Tout passe par le crible de l'esprit critique." },
      { id:"p17", auteur:"Ebénézer Njoh Mouelle", oeuvre:"Jalons", citation:"La philosophie naît des situations troubles.", explication:"La réflexion philosophique naît du fait qu'il y a un problème, une crise, un manque dans la réalité." },
      { id:"p18", auteur:"Hegel", oeuvre:"Principes de philosophie du droit", citation:"La chouette de Minerve ne prend son envol qu'au crépuscule.", explication:"Le philosophe réfléchit sur ce qui a déjà été accompli, après que cela ait été accompli." },
      { id:"p19", auteur:"Rabelais", oeuvre:"", citation:"Science sans conscience n'est que ruine de l'âme.", explication:"Sans la philosophie, les produits de la technoscience vont se retourner contre l'homme lui-même." },
      { id:"p20", auteur:"Hegel", oeuvre:"", citation:"Toute philosophie est fille de son temps.", explication:"Tout système philosophique trouve son origine dans des circonstances historiques précises." },
    ]
  },
  { id:2, slug:"conscience", title:"La conscience et l'inconscient", emoji:"🧠", color:"#0891B2",
    citations:[
      { id:"c1", auteur:"Sigmund Freud", oeuvre:"", citation:"Le Moi n'est pas maître dans sa propre demeure.", explication:"La psychanalyse refuse que la conscience soit toute puissante et constitue le fond du psychisme humain." },
      { id:"c2", auteur:"Sigmund Freud", oeuvre:"Science des rêves", citation:"L'interprétation des rêves est la voie royale qui mène à la connaissance de l'inconscient dans la vie psychique.", explication:"Le rêve est une manifestation privilégiée de notre inconscient dont l'interprétation est capitale." },
      { id:"c3", auteur:"Jean-Paul Sartre", oeuvre:"L'Etre et le néant", citation:"L'inconscient n'est que la mauvaise foi chosifiée.", explication:"L'homme est toujours conscient. L'illusion de l'inconscient vient de la mauvaise foi." },
      { id:"c4", auteur:"René Descartes", oeuvre:"Discours de la méthode", citation:"Je pense donc je suis.", explication:"Le doute révèle que douter c'est penser. Si je pense, il faut bien que j'existe. La pensée est le fondement de toute connaissance." },
      { id:"c5", auteur:"Blaise Pascal", oeuvre:"", citation:"L'homme n'est qu'un roseau, le plus faible de la nature mais c'est un roseau pensant.", explication:"L'essence de l'homme réside dans la conscience. Par la conscience, l'homme s'élève au-dessus des autres créatures." },
      { id:"c6", auteur:"Edmund Husserl", oeuvre:"Méditation cartésienne", citation:"Toute conscience est conscience de quelque chose.", explication:"La conscience est toujours ouverture vers le monde. Elle vise un objet extérieur à elle-même." },
      { id:"c7", auteur:"Spinoza", oeuvre:"Ethique", citation:"Les hommes se croient libres pour la seule raison qu'ils sont conscients de leurs actions et ignorants des causes par lesquelles ils sont déterminés.", explication:"L'illusion de la conscience vient du fait que les hommes ignorent les causes profondes et réelles de leurs actions." },
      { id:"c8", auteur:"Karl Marx", oeuvre:"L'Idéologie allemande", citation:"Ce n'est pas la conscience des hommes qui détermine leur existence, mais c'est leur existence sociale qui détermine leur conscience.", explication:"L'homme est conditionné par les réalités socio-historiques qu'il a connues." },
      { id:"c9", auteur:"Henri Bergson", oeuvre:"", citation:"Toute conscience signifie choix.", explication:"La conscience est une activité de sélection, de discernement liée au présent et à l'action." },
      { id:"c10", auteur:"Alain", oeuvre:"", citation:"L'inconscient est une méprise sur le moi, c'est une idolâtrie du corps.", explication:"L'inconscient psychique n'existe pas selon Alain. Tout ce qui est psychique est conscient." },
      { id:"c11", auteur:"Jean-Paul Sartre", oeuvre:"L'Etre et le néant", citation:"Il n'y a pour une conscience qu'une façon d'exister, c'est d'avoir conscience qu'elle existe.", explication:"Toute conscience est conscience d'elle-même. L'homme ne peut pas être sans savoir qu'il est." },
    ]
  },
  { id:3, slug:"desir", title:"Désir et passion", emoji:"🔥", color:"#DC2626",

function saveProgress() {
  localStorage.setItem('pf_progress', JSON.stringify(state.progress));
  const today = new Date().toDateString();
  if (state.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (state.lastDate === yesterday) state.streak++;
    else state.streak = 1;
    state.lastDate = today;
    localStorage.setItem('pf_streak', state.streak);
    localStorage.setItem('pf_lastdate', today);
  }
}

function getProgress(themeId) {
  return state.progress[themeId] || 0;
}

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function getAllCitations() {
  return themes.flatMap(t => t.citations.map(c => ({ ...c, theme: t.title, themeColor: t.color })));
}

// ───────────────────────────────────────────────────────────────
// NAVIGATION
// ───────────────────────────────────────────────────────────────
function goHome() {
  state.screen = 'home';
  state.activeTab = 'home';
  render();
}

function goTheme(theme) {
  state.selectedTheme = theme;
  state.screen = 'theme';
  state.gameMode = 'flashcard';
  render();
}

function startGame(mode) {
  const t = state.selectedTheme;
  state.gameMode = mode;
  state.cards = shuffle(t.citations);
  state.cardIndex = 0;
  state.cardFlipped = false;
  state.score = 0;
  state.total = state.cards.length;
  state.knownCards = new Set();
  if (mode === 'quiz') setupQuiz();
  if (mode === 'trous') setupTrous();
  state.screen = mode;
  render();
}

function startAll(mode) {
  const all = shuffle(getAllCitations()).slice(0, 15);
  state.selectedTheme = { title: 'Tout réviser', emoji: '📚', color: '#f0c040', citations: all };
  state.gameMode = mode;
  state.cards = all;
  state.cardIndex = 0;
  state.cardFlipped = false;
  state.score = 0;
  state.total = all.length;
  state.knownCards = new Set();
  if (mode === 'quiz') setupQuiz();
  if (mode === 'trous') setupTrous();
  state.screen = mode;
  render();
}

// ───────────────────────────────────────────────────────────────
// FLASHCARD LOGIC
// ───────────────────────────────────────────────────────────────
function flipCard() {
  state.cardFlipped = !state.cardFlipped;
  render();
}

function cardAnswer(known) {
  if (known) {
    state.score++;
    state.knownCards.add(state.cards[state.cardIndex].id);
  }
  nextCard();
}

function nextCard() {
  state.cardFlipped = false;
  if (state.cardIndex < state.cards.length - 1) {
    state.cardIndex++;
    render();
  } else {
    finishGame();
  }
}

// ───────────────────────────────────────────────────────────────
// QUIZ LOGIC
// ───────────────────────────────────────────────────────────────
function setupQuiz() {
  const card = state.cards[state.cardIndex];
  const allAuthors = [...new Set(getAllCitations().map(c => c.auteur))];
  const wrongAuthors = shuffle(allAuthors.filter(a => a !== card.auteur)).slice(0, 3);
  const options = shuffle([card.auteur, ...wrongAuthors]);
  state.quizQuestion = card;
  state.quizOptions = options;
  state.quizAnswered = false;
  state.quizCorrectIdx = options.indexOf(card.auteur);
  state.quizChosenIdx = null;
}

function answerQuiz(idx) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  state.quizChosenIdx = idx;
  if (idx === state.quizCorrectIdx) state.score++;
  render();
}

function nextQuiz() {
  state.cardFlipped = false;
  if (state.cardIndex < state.cards.length - 1) {
    state.cardIndex++;
    setupQuiz();
    render();
  } else {
    finishGame();
  }
}

// ───────────────────────────────────────────────────────────────
// TROUS LOGIC
// ───────────────────────────────────────────────────────────────
function setupTrous() {
  const card = state.cards[state.cardIndex];
  state.trousAnswer = '';
  state.trousAnswered = false;
  state.trousCorrect = false;
  // pick a key word from auteur
  state.trousTarget = card.auteur;
}

function checkTrous() {
  if (!state.trousAnswer.trim()) return;
  state.trousAnswered = true;
  const guess = state.trousAnswer.trim().toLowerCase();
  const target = state.trousTarget.toLowerCase();
  state.trousCorrect = guess === target || target.includes(guess) || guess.includes(target.split(' ').pop());
  if (state.trousCorrect) state.score++;
  render();
}

function nextTrous() {
  if (state.cardIndex < state.cards.length - 1) {
    state.cardIndex++;
    setupTrous();
    render();
  } else {
    finishGame();
  }
}

// ───────────────────────────────────────────────────────────────
// FINISH
// ───────────────────────────────────────────────────────────────
function finishGame() {
  if (state.selectedTheme && state.selectedTheme.id) {
    const pct = Math.round((state.score / state.total) * 100);
    state.progress[state.selectedTheme.id] = Math.max(state.progress[state.selectedTheme.id] || 0, pct);
    saveProgress();
  }
  state.screen = 'results';
  render();
}

function getResultMsg(pct) {
  if (pct >= 90) return { msg: '🏆 Excellent !', sub: 'Tu maîtrises parfaitement ce thème !' };
  if (pct >= 70) return { msg: '🎯 Très bien !', sub: 'Continue comme ça, le Bac est à ta portée !' };
  if (pct >= 50) return { msg: '📚 Pas mal !', sub: 'Encore un peu de révision et tu y es !' };
  return { msg: '💪 On s\'accroche !', sub: 'Revois ce thème et retente ta chance.' };
}

// ───────────────────────────────────────────────────────────────
// EVENTS
// ───────────────────────────────────────────────────────────────
function bindEvents() {
  // Nav
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => {
      state.activeTab = el.dataset.nav;
      state.screen = el.dataset.nav;
      render();
    });
  });

  // Actions
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', (e) => {
      const action = el.dataset.action;
      if (action === 'goTheme') {
        const theme = themes.find(t => t.id == el.dataset.id);
        goTheme(theme);
      } else if (action === 'back') {
        if (['flashcard','quiz','trous'].includes(state.screen)) {
          state.screen = 'theme';
          render();
        } else {
          goHome();
        }
      } else if (action === 'flip') {
        flipCard();
      } else if (action === 'cardFail') {
        cardAnswer(false);
      } else if (action === 'cardPass') {
        cardAnswer(true);
      } else if (action === 'startGame') {
        startGame(state.gameMode);
      } else if (action === 'answerQuiz') {
        answerQuiz(parseInt(el.dataset.idx));
      } else if (action === 'nextQuiz') {
        nextQuiz();
      } else if (action === 'checkTrous') {
        const input = document.getElementById('trousInput');
        if (input) state.trousAnswer = input.value;
        checkTrous();
      } else if (action === 'nextTrous') {
        nextTrous();
      } else if (action === 'retry') {
        state.screen = 'theme';
        render();
      } else if (action === 'goHome') {
        goHome();
      } else if (action === 'startAll') {
        startAll(el.dataset.mode);
      }
    });
  });

  // Mode tabs
  document.querySelectorAll('[data-mode]').forEach(el => {
    el.addEventListener('click', () => {
      state.gameMode = el.dataset.mode;
      render();
    });
  });

  // Trous input — enter to validate
  const ti = document.getElementById('trousInput');
  if (ti) {
    ti.focus();
    ti.addEventListener('input', e => { state.trousAnswer = e.target.value; });
    ti.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !state.trousAnswered) checkTrous();
    });
  }
}

// ───────────────────────────────────────────────────────────────
// INIT
// ───────────────────────────────────────────────────────────────
render();
</script>
